# Smoke-test config — tiny end-to-end pass exercising the full stack:
# config → seed → data (sparse ED) → transformer training → activation
# extraction → SAE training → run logging. Not a science run.
seed: 0

data:
  L: 6              # sites (Hilbert dim 64 — trivial ED)
  n_train: 96
  n_val: 32
  h_min: 0.1
  h_max: 2.0
  J: 1.0

model:
  d_model: 32
  n_heads: 4
  n_layers: 2
  d_ff: 64
  dropout: 0.0

train:
  epochs: 3
  batch_size: 32
  lr: 3.0e-4

sae:
  d_hidden: 64
  k: 8
  epochs: 5
  batch_size: 32

logging:
  wandb: false
